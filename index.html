<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bun & Scoop - Feel the Cravings</title>
  <meta name="description" content="Bun & Scoop - Feel the Cravings. Discover our delicious menu of buns and scoops.">
  <link rel="icon" type="image/jpeg" href="profile.jpg">

  <!-- Open Graph -->
  <meta property="og:title" content="Bun & Scoop - Feel the Cravings">
  <meta property="og:description" content="Bun & Scoop - Feel the Cravings. Discover our delicious menu of buns and scoops.">
  <meta property="og:image" content="profile.jpg">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bun & Scoop - Feel the Cravings">
  <meta name="twitter:description" content="Bun & Scoop - Feel the Cravings. Discover our delicious menu of buns and scoops.">
  <meta name="twitter:image" content="profile.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    body {
      font-family: 'Geist', sans-serif;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
    }

    .container {
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .background {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .background::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(70, 40, 15, 0.75) 0%,
        rgba(70, 40, 15, 0.5) 40%,
        rgba(70, 40, 15, 0.3) 100%
      );
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 60px 30px 40px;
      flex: 1;
    }

    .profile-image {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 18px;
    }

    .name {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 40px;
    }

    .established {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      margin-bottom: 40px;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.95);
      border: none;
      border-radius: 50px;
      font-family: 'Geist', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: #2c2c2c;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .link-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .link-btn:active {
      transform: scale(0.98);
    }

    .socials {
      display: flex;
      gap: 20px;
      margin-top: auto;
      padding-bottom: 40px;
    }

    .socials a {
      color: #ffffff;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .socials a:hover {
      opacity: 0.8;
      transform: scale(1.1);
    }

    .socials svg {
      width: 28px;
      height: 28px;
    }

    @media (min-width: 420px) {
      body {
        padding: 20px;
      }
      .container {
        min-height: 800px;
        max-height: 900px;
        border-radius: 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="background">
      <img src="background.jpg" alt="Background">
    </div>

    <div class="content">
      <img class="profile-image" src="profile.jpg" alt="Bun & Scoop">

      <h1 class="name">Bun & Scoop</h1>
      <p class="tagline">Feel the Cravings</p>

      <div class="links">
        <a href="https://menuthere.com/bunandscoop" class="link-btn">Menu</a>
        <a href="https://play.google.com/store/apps/details?id=com.menuthere.bunandscoop" class="link-btn" target="_blank" rel="noopener noreferrer">Playstore</a>
        <a href="https://apps.apple.com/in/app/bun-scoop/id6761656974" class="link-btn" target="_blank" rel="noopener noreferrer">Appstore</a>
      </div>

      <div class="socials">
        <!-- Facebook -->
        <a href="#facebook" aria-label="Facebook">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </a>
        <!-- Instagram -->
        <a href="#instagram" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="5"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </a>
        <!-- Google -->
        <a href="#google" aria-label="Google">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
